name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Assert dist outputs exist
        run: |
          test -f dist/index.js   || (echo "Missing dist/index.js"   && exit 1)
          test -f dist/index.cjs  || (echo "Missing dist/index.cjs"  && exit 1)
          test -f dist/index.d.ts || (echo "Missing dist/index.d.ts" && exit 1)
      - name: Assert process.env.NODE_ENV was replaced
        run: |
          grep -q "process.env.NODE_ENV" dist/index.js  && (echo "process.env.NODE_ENV found in dist/index.js"  && exit 1) || true
          grep -q "process.env.NODE_ENV" dist/index.cjs && (echo "process.env.NODE_ENV found in dist/index.cjs" && exit 1) || true
